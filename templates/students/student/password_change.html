{% extends 'base.html' %}
{% block content %}
<h1 class="text-2xl font-display text-[#1B2430] mb-6">Change Password</h1>

<div class="bg-white rounded-lg shadow-sm p-6 max-w-md">
  <form method="post">
    {% csrf_token %}

    <div class="mb-4">
      <label for="current_password" class="block text-sm font-medium text-gray-700 mb-1">Current Password</label>
      <input type="password" id="current_password" name="current_password" required
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
    </div>

    <div class="mb-4">
      <label for="new_password" class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
      <input type="password" id="new_password" name="new_password" required
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
    </div>

    <div class="mb-6">
      <label for="confirm_password" class="block text-sm font-medium text-gray-700 mb-1">Confirm New Password</label>
      <input type="password" id="confirm_password" name="confirm_password" required
             class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
    </div>

    <button type="submit"
            class="w-full bg-[#0f172a] text-white text-sm font-medium py-2 rounded-lg hover:bg-slate-700 transition-colors">
      Change Password
    </button>
  </form>
</div>
{% endblock %}
