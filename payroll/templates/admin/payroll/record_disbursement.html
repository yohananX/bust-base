{% extends "admin/base_site.html" %}
{% load i18n %}

{% block content %}
<div id="content-main">
  <h1>{{ title }}</h1>
  <form method="post">
    {% csrf_token %}
    {% for obj in queryset %}
    <input type="hidden" name="_selected_action" value="{{ obj.pk }}" />
    {% endfor %}
    <input type="hidden" name="action" value="record_disbursement" />
    <input type="hidden" name="apply" value="1" />

    <div style="padding: 20px; background: #f8f8f8; border: 1px solid #ddd; margin: 20px 0;">
      <p>{% trans "Selected payslips:" %} {{ queryset|length }}</p>
      <table>
        <tr>
          <td><label for="method" style="font-weight: bold;">{% trans "Method:" %}</label></td>
          <td>
            <select name="method" id="method" style="min-width: 200px; padding: 5px;">
              <option value="BANK_TRANSFER">{% trans "Bank Transfer" %}</option>
              <option value="CASH">{% trans "Cash" %}</option>
              <option value="CHEQUE">{% trans "Cheque" %}</option>
            </select>
          </td>
        </tr>
        <tr>
          <td><label for="reference" style="font-weight: bold;">{% trans "Reference Base:" %}</label></td>
          <td>
            <input type="text" name="reference" id="reference" style="min-width: 300px; padding: 5px;" placeholder="e.g. SAL-JUL-2026" />
            <br /><small>{% trans "A unique suffix will be added per payslip." %}</small>
          </td>
        </tr>
        <tr>
          <td><label for="disbursed_on" style="font-weight: bold;">{% trans "Disbursed On:" %}</label></td>
          <td><input type="datetime-local" name="disbursed_on" id="disbursed_on" style="padding: 5px;" /></td>
        </tr>
      </table>
    </div>

    <div style="padding: 10px 0;">
      <input type="submit" value="{% trans 'Record Disbursements' %}" class="default" style="padding: 10px 20px;" />
    </div>
  </form>
</div>
{% endblock %}
