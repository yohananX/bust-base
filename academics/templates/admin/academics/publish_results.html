{% extends "admin/base_site.html" %}
{% load i18n %}

{% block content %}
<div id="content-main">
  <h1>{{ title }}</h1>
  <form method="post">
    {% csrf_token %}
    {% for obj in queryset %}
    <input type="hidden" name="_selected_action" value="{{ obj.pk }}" />
    {% endfor %}
    <input type="hidden" name="action" value="publish_results" />
    <input type="hidden" name="apply" value="1" />

    <p>{% trans "The selected scores belong to the following terms. Select a term to publish results for:" %}</p>

    <div style="padding: 20px; background: #f8f8f8; border: 1px solid #ddd; margin: 20px 0;">
      <label for="term" style="font-weight: bold; margin-right: 10px;">{% trans "Select Term:" %}</label>
      <select name="term" id="term" style="min-width: 200px; padding: 5px;">
        <option value="">{% trans "---------" %}</option>
        {% for term in terms %}
        <option value="{{ term.pk }}">{{ term.name }} ({{ term.session.name }})</option>
        {% endfor %}
      </select>
    </div>

    <div style="padding: 10px 0;">
      <input type="submit" value="{% trans 'Publish Results' %}" class="default" style="padding: 10px 20px;" />
    </div>
  </form>
</div>
{% endblock %}
