{% if subjects %}
<div class="flex flex-wrap gap-2">
  {% for s in subjects %}
  <label class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-full text-sm border transition-colors cursor-pointer
    {% if s.pk in assigned_subject_ids %}
      bg-gray-100 border-gray-200 text-gray-400 cursor-not-allowed
    {% else %}
      bg-white border-gray-300 text-gray-700 hover:border-[#1B2430] hover:bg-gray-50
    {% endif %}">
    {% if s.pk in assigned_subject_ids %}
      <input type="checkbox" name="subject_ids" value="{{ s.pk }}" disabled class="sr-only">
      <span class="text-green-500 text-xs">✓</span>
      <span>{{ s.name }}</span>
      <span class="text-xs text-gray-400">(assigned)</span>
    {% else %}
      <input type="checkbox" name="subject_ids" value="{{ s.pk }}" class="sr-only peer">
      <span class="w-3.5 h-3.5 rounded border border-gray-300 flex items-center justify-center
        peer-checked:bg-[#1B2430] peer-checked:border-[#1B2430] peer-checked:text-white transition-colors">
        <svg class="w-2.5 h-2.5 hidden peer-checked:block" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
        </svg>
      </span>
      <span class="peer-checked:text-[#1B2430] peer-checked:font-medium">{{ s.name }}</span>
    {% endif %}
  </label>
  {% endfor %}
</div>
{% else %}
<p class="text-xs text-gray-400 italic">No subjects configured for this school.</p>
{% endif %}
